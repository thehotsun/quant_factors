# 推送渠道配置
# 支持: dingtalk(钉钉机器人), feishu(飞书机器人), console(控制台)
#
# 钉钉机器人配置步骤:
#   1. 钉钉群 → 群设置 → 智能群助手 → 添加机器人 → 自定义
#   2. 复制 webhook URL
#   3. (可选) 设置加签密钥
#
# 飞书机器人配置步骤:
#   1. 飞书群 → 设置 → 群机器人 → 添加机器人 → 自定义机器人
#   2. 复制 webhook URL

channels:
  # 默认使用控制台输出（开发/测试环境）
  - type: console

  # 钉钉推送（生产环境取消注释并填入 webhook_url）
  # - type: dingtalk
  #   webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
  #   secret: "YOUR_SECRET"  # 可选，加签方式

  # 飞书推送（生产环境取消注释并填入 webhook_url）
  # - type: feishu
  #   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_TOKEN"