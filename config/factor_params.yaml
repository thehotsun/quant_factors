# 信号聚合配置
aggregation:
  default_method: "weighted"
  min_confidence: 0.40
  conflict_resolution: "strongest"

# 宏观驱动分类（信号去重用）
# trigger 名称包含关键词 → 归类为对应 driver
# 修改此配置可实时调整 driver 分组，无需改代码
driver_patterns:
  growth:
    - pmi
    - gdp
    - industrial
    - manufacturing
  inflation:
    - cpi
    - ppi
    - inflation
    - oil_
    - crude
  real_rate:
    - tips
    - real_rate
    - gold_tips
  fx:
    - forex
    - usd_cny
    - rmb
    - depreciation
    - appreciation
  risk_off:
    - vix
    - panic
    - safe_haven
    - gold_vix
  inventory:
    - eia
    - stock
    - inventory
    - crude_stock
  cost:
    - feed_cost
    - iron_ore
    - cost_push
    - crush_margin
  seasonality:
    - seasonal
    - season
  supply:
    - supply_shock
    - weather
    - drought
    - flood

# 相关性去重分组（信号聚合时对同组信号降权）
correlation_groups:
  corn_feed:
    members: ["corn_surge", "feed_cost_high", "feed_cost_surge"]
    description: "玉米→饲料成本：玉米涨→饲料成本涨，信号高度重叠"
  soybean_meal:
    members: ["soybean_meal_surge", "feed_cost_high", "cbot_soybean_surge"]
    description: "豆粕→饲料成本：豆粕涨→饲料成本涨，CBOT大豆涨→豆粕涨"
  pork_cycle:
    members: ["pork_cycle_bottom", "pig_grain_level1", "pig_grain_level2"]
    description: "猪周期底部：猪价低→猪粮比低→收储预期，信号重叠"
  iron_steel:
    members: ["iron_ore_surge", "iron_ore_high_zscore", "steel_loss_cut", "iron_rebar_cost_push", "iron_lead_rebar"]
    description: "铁矿石→螺纹钢：铁矿涨→成本推升→螺纹钢涨，信号重叠"
  gold_drivers:
    members: ["gold_tips_low", "gold_rmb_depreciation", "gold_oil_inflation", "gold_vix_high"]
    description: "黄金多驱动：实际利率/汇率/通胀/恐慌可能同时触发"

# 回测配置
backtest:
  default_holding_days: 10
  default_stop_loss: -0.03
  commission_rate: 0.0003
  slippage: 0.001