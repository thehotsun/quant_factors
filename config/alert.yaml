# 盘中异动告警配置
#
# 当期货品种日内涨跌幅超过阈值时，推送告警通知。
# 同品种同一天不重复告警。

# 涨跌幅阈值（百分比）
threshold: 5.0

# 检查频率（分钟）—— 由 scheduler 控制，此处仅作文档说明
# 当前配置：每 30 分钟检查一次（9:00-15:00 日盘 + 21:00-23:00 夜盘）

# 监控品种（全部启用）
# 如需排除某些品种，注释掉即可
monitored_symbols:
  - LH0    # 生猪
  - JD0    # 鸡蛋
  - M0     # 豆粕
  - C0     # 玉米
  - CU0    # 铜
  - AL0    # 铝
  - RB0    # 螺纹钢
  - AU0    # 黄金
  - AG0    # 白银
  - I0     # 铁矿石
  - SC0    # 原油
  - A0     # 国产大豆
  - B0     # 进口大豆
  - RM0    # 菜粕
  - Y0     # 豆油
