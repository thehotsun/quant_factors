# 盘中异动告警配置
#
# 分级告警机制：
# - 初始告警：涨跌幅超过第1档阈值
# - 升级告警：涨跌幅扩大到第2档
# - 严重告警：涨跌幅扩大到第3档
# - 恢复通知：涨跌幅回到初始阈值的50%以内时推送告警解除
# 同档位同品种同一天不重复告警。

# ── 期货告警 ──────────────────────────────────────────────

# 涨跌幅阈值（百分比），三档
threshold: 5.0        # 第1档：初始告警
# 第2档: 8.0（代码内置）
# 第3档: 12.0（代码内置）

# ── 现货告警 ──────────────────────────────────────────────

# 现货涨跌幅阈值（百分比）—— 现货波动通常比期货小
spot_threshold: 3.0   # 第1档：初始告警
# 第2档: 5.0（代码内置）
# 第3档: 8.0（代码内置）

# ── 恢复通知 ──────────────────────────────────────────────

# 恢复判定：涨跌幅 < 初始阈值 × recovery_ratio
# 例：期货初始5%，recovery_ratio=0.5，则涨跌幅回到±2.5%以内算恢复
recovery_ratio: 0.5

# ── 检查频率 ──────────────────────────────────────────────

# 由 scheduler 控制，此处仅作文档说明
# 当前配置：每 30 分钟检查一次（9:00-15:00 日盘 + 21:00-23:00 夜盘）

# ── 监控品种 ──────────────────────────────────────────────

# 期货监控品种（全部启用）
monitored_symbols:
  - LH0    # 生猪
  - JD0    # 鸡蛋
  - M0     # 豆粕
  - C0     # 玉米
  - CU0    # 铜
  - AL0    # 铝
  - RB0    # 螺纹钢
  - AU0    # 黄金
  - AG0    # 白银
  - I0     # 铁矿石
  - SC0    # 原油
  - A0     # 国产大豆
  - B0     # 进口大豆
  - RM0    # 菜粕
  - Y0     # 豆油

# 现货监控品种（使用 soozhu 实时接口）
spot_monitored:
  - pork             # 生猪现货
  - corn             # 玉米现货
  - soybean_domestic # 国产大豆现货
